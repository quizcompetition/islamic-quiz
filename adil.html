<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic Quiz 2026 | Farah Portal</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--emerald-deep:#022c22;
--emerald-mid:#064e3b;
--gold:#fbbf24;
--soft-white:#f8fafc;
}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--soft-white);
color:#1e293b;
}
.arabic-font{font-family:'Amiri',serif;}
.hero-section{
background:radial-gradient(circle at top right,rgba(6,78,59,.98),rgba(2,44,34,1)),
url('https://www.transparenttextures.com/patterns/islamic-art.png');
}
.glass-card{
background:rgba(255,255,255,.95);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,.4);
box-shadow:0 25px 50px -12px rgba(0,0,0,.08);
}
.premium-input{
background:#f8fafc;
border:2px solid #e2e8f0;
}
.premium-input:focus{
background:#fff;
border-color:var(--emerald-mid);
outline:none;
}
</style>
</head>

<body>

<!-- ================= REGISTER FORM ================= -->
<section class="max-w-xl mx-auto mt-20 glass-card p-10 rounded-3xl">

<h2 class="text-3xl font-black text-center mb-8">Islamic Quiz Registration</h2>

<form id="regForm" class="space-y-6">

<input id="name" required placeholder="Full Name"
class="premium-input w-full px-6 py-4 rounded-xl font-bold">

<input id="father" required placeholder="Father Name"
class="premium-input w-full px-6 py-4 rounded-xl font-bold">

<input id="phone" required placeholder="WhatsApp Number"
class="premium-input w-full px-6 py-4 rounded-xl font-bold">

<input id="school" required placeholder="Masjid / Maktab"
class="premium-input w-full px-6 py-4 rounded-xl font-bold">

<textarea id="address" required placeholder="Address"
class="premium-input w-full px-6 py-4 rounded-xl font-bold"></textarea>

<button id="submitBtn"
class="w-full bg-emerald-900 text-white py-5 rounded-2xl font-black text-xl">
Register Now
</button>

</form>
</section>

<!-- ================= SUCCESS MODAL ================= -->
<div id="successMsg"
class="fixed inset-0 hidden bg-emerald-950/90 flex items-center justify-center z-50">

<div class="bg-white p-12 rounded-3xl text-center max-w-md w-full">
<div class="text-6xl mb-4">✅</div>
<h3 class="text-3xl font-black mb-4">Registration Successful!</h3>
<p class="text-slate-600 mb-8">
Aapka data Google Sheet me save ho gaya hai.
</p>
<button onclick="location.reload()"
class="bg-emerald-900 text-white px-8 py-4 rounded-xl font-black">
OK
</button>
</div>
</div>

<!-- ================= SHEETDB SCRIPT ================= -->
<script>
const form = document.getElementById("regForm");
const btn = document.getElementById("submitBtn");

const API_1 = "https://sheetdb.io/api/v1/mlajqnn95pufs";
const API_2 = "https://sheetdb.io/api/v1/sv5ixzaptcqk7";

form.addEventListener("submit", async (e) => {
e.preventDefault();

btn.disabled = true;
btn.innerHTML = "Saving...";

const payload = {
data:{
name: name.value,
father: father.value,
phone: phone.value,
school: school.value,
address: address.value,
time: new Date().toLocaleString()
}
};

try{
await fetch(API_1,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(payload)
});

await fetch(API_2,{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify(payload)
});

document.getElementById("successMsg").classList.remove("hidden");
form.reset();
btn.innerHTML = "DONE ✅";

}catch(err){
alert("❌ Data save failed. Internet / SheetDB check karein");
btn.disabled=false;
btn.innerHTML="Register Now";
}
});
</script>

</body>
</html>
